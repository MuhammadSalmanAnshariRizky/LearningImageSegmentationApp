<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Image Segmentation Learning</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --background: #FFFFFF;
            --foreground: #1E293B;
            --card: #FFFFFF;
            --primary: #1A1A2E;
            --primary-hover: #2A2A4A;
            --primary-foreground: #FFFFFF;
            --muted: #F1F5F9;
            --muted-foreground: #64748B;
            --border: #E2E8F0;
            --input-border: #CBD5E1;
            --ring: #1A1A2E;
            --radius: 0.75rem;
            --shadow-elegant: 0 20px 60px -10px rgba(30, 41, 59, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(26, 26, 46, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(30, 41, 59, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .register-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            margin: auto;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem;
            box-shadow: 0 6px 16px -4px rgba(26, 26, 46, 0.4);
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--foreground);
        }

        .brand-name span {
            color: var(--primary);
        }

        .register-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem 2rem;
            box-shadow: var(--shadow-elegant);
        }

        .register-header {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .register-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .register-header p {
            color: var(--muted-foreground);
            font-size: 0.875rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .form-group {
            margin-bottom: 0.75rem;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.35rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-foreground);
            pointer-events: none;
            display: flex;
        }

        .input-icon svg {
            width: 16px;
            height: 16px;
        }

        .form-input,
        .form-select {
            width: 100%;
            height: 40px;
            padding: 0 0.75rem 0 2.25rem;
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--foreground);
            background: var(--background);
            border: 1px solid var(--input-border);
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2364748B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            padding-right: 2rem;
            cursor: pointer;
        }

        .form-input::placeholder {
            color: #94A3B8;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            color: var(--muted-foreground);
            display: flex;
            border-radius: 0.375rem;
            transition: color 0.2s;
        }

        .password-toggle svg {
            width: 16px;
            height: 16px;
        }

        .password-toggle:hover {
            color: var(--foreground);
        }

        .btn-register {
            width: 100%;
            height: 42px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px -2px rgba(26, 26, 46, 0.35);
            margin-top: 1rem;
        }

        .btn-register:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
            color: var(--muted-foreground);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-text {
            text-align: center;
            font-size: 0.8125rem;
            color: var(--muted-foreground);
        }

        .login-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .login-text a:hover {
            text-decoration: underline;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid var(--card-border);
            padding: 18px 0;
            background: white;
        }

        .footer .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--fg);
        }

        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;

            margin-top: 20px;

            color: var(--muted-foreground);
            text-decoration: none;

            font-size: 14px;
            font-weight: 500;

            transition: 0.2s;
        }

        .btn-back:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-row .form-group {
                margin-bottom: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="register-wrapper">
        <div class="brand">
            <div class="brand-icon">SI</div>
            <div class="brand-name">Segmentation<span> Image</span></div>
        </div>

        <div class="register-card">
            <div class="register-header">
                <h1>Buat Akun Baru</h1>
                <p>Daftar untuk mulai belajar Image Segmentation</p>
            </div>

            <form method="POST" action="{{ url_for('user.register') }}">

                <div class="form-group">
                    <label class="form-label">Daftar Sebagai</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <select name="role" id="role" class="form-select" required
                            onchange="toggleClassCode(this.value)">
                            <option value="" disabled {% if not old or not old.role %}selected{% endif %}>Pilih Role
                            </option>
                            <option value="Student" {% if old and old.role=='Student' %}selected{% endif %}>Mahasiswa
                            </option>
                            <option value="Teacher" {% if old and old.role=='Teacher' %}selected{% endif %}>Dosen
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <input type="text" name="name" id="nama" class="form-input" placeholder="Masukkan nama"
                            value="{{ old.name if old }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg>
                        </div>
                        <input type="email" name="email" class="form-input" placeholder="contoh@email.com"
                            value="{{ old.email if old }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Jenis ID</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="18" height="14" x="3" y="5" rx="2" ry="2"></rect>
                                    <path d="M7 15h1m4 0h1m-7-4h1m4 0h1"></path>
                                </svg>
                            </div>
                            <select name="type_id_other" class="form-select" required>
                                <option value="" disabled {% if not old or not old.type_id_other %}selected{% endif %}>
                                    Pilih Jenis</option>
                                <option value="NIM" {% if old and old.type_id_other=='NIM' %}selected{% endif %}>NIM
                                </option>
                                <option value="NIDN" {% if old and old.type_id_other=='NIDN' %}selected{% endif %}>NIDN
                                </option>
                                <option value="NIP" {% if old and old.type_id_other=='NIP' %}selected{% endif %}>NIP
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nomor ID</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                                    <path d="M10 4v4a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V4"></path>
                                    <path d="M12 12v6"></path>
                                    <path d="M8 18h8"></path>
                                </svg>
                            </div>
                            <input type="text" name="id_other" class="form-input" placeholder="No. ID"
                                value="{{ old.id_other if old }}" required>
                        </div>
                    </div>
                </div>

                <div class="form-group" id="classCodeContainer" style="display: none;">
                    <label class="form-label">Kode Kelas</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="4" x2="20" y1="9" y2="9" />
                                <line x1="4" x2="20" y1="15" y2="15" />
                                <line x1="10" x2="8" y1="3" y2="21" />
                                <line x1="16" x2="14" y1="3" y2="21" />
                            </svg>
                        </div>
                        <input type="text" name="class_code" id="class_code" class="form-input"
                            placeholder="Masukkan kode kelas" value="{{ old.class_code if old }}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                        <input type="password" name="password" id="password" class="form-input"
                            placeholder="Buat password" style="padding-right: 2.5rem;" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()"
                            title="Tampilkan/Sembunyikan Password">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    Daftar Akun
                </button>

                <div class="divider">atau</div>

                <p class="login-text">
                    Sudah punya akun?
                    <a href="{{ url_for('user.login') }}">Login di sini</a>
                </p>
                <a href="/" class="btn-back">
                    ← Kembali ke Landing Page
                </a>

            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const status = "{{ request.args.get('status') | default('') }}";
        const message = "{{ request.args.get('message') | default('') }}";

        if (status && status !== "None" && message && message !== "None") {
            Swal.fire({
                icon: status === 'success' ? 'success' : 'error',
                title: status === 'success' ? 'Berhasil' : 'Gagal',
                text: message,
                showConfirmButton: true,
                confirmButtonText: 'OK',
                confirmButtonColor: '#1A1A2E',
            }).then((result) => {
                if (result.isConfirmed) {
                    if (status === 'success') {
                        window.location.href = "{{ url_for('user.login') }}";
                    } else {
                        if (window.history.replaceState) {
                            const url = new URL(window.location);
                            url.searchParams.delete('status');
                            url.searchParams.delete('message');
                            window.history.replaceState({ path: url.href }, '', url.href);
                        }
                    }
                }
            });
        }
    </script>
    <script>
        function toggleClassCode(role) {
            const container = document.getElementById('classCodeContainer');
            const input = document.getElementById('class_code');

            if (role === 'Student') {
                container.style.display = 'block';
                input.setAttribute('required', 'required');
            } else {
                container.style.display = 'none';
                input.removeAttribute('required');
                input.value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const currentRole = document.getElementById('role').value;
            if (currentRole) {
                toggleClassCode(currentRole);
            }
        });
    </script>
</body>

</html>
