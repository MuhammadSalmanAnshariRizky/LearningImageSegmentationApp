{% extends "layouts/base.html" %}

{% block content %}


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- 🔥 TINYMCE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>

<!-- 🔥 MATHJAX CONFIG -->
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['\\[', '\\]']]
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
    body {
        background-color: #f1f5f9;
    }

    .card-custom {
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .info-box {
        background: #eef6ff;
        border-left: 4px solid #0d6efd;
        padding: 10px 15px;
        border-radius: 8px;
    }
</style>

<div class="card card-custom p-4">

    <div class="header-top">
        <h4 class="fw-bold text-warning">
            <i class="bi bi-pencil-square"></i> Edit Soal
        </h4>

        <a href="{{ url_for('user.data_soal') }}" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Kembali
        </a>
    </div>

    <div class="info-box mb-4">
        <b>Catatan:</b> Soal akan diperbarui pada <b>Activity</b>.
    </div>

    <form method="POST">

        <div class="row">

            <div class="col-md-3">
                <label class="form-label">Tipe Soal</label>
                <select class="form-select" disabled>
                    <option value="mc" {{ 'selected' if soal.type=='mc' else '' }}>Pilihan Ganda</option>
                    <option value="isian" {{ 'selected' if soal.type=='isian' else '' }}>Isian</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Kesulitan</label>
                <select name="kesulitan" class="form-select">
                    <option value="mudah" {{ 'selected' if soal.tingkat_kesulitan=='mudah' else '' }}>Mudah</option>
                    <option value="sedang" {{ 'selected' if soal.tingkat_kesulitan=='sedang' else '' }}>Sedang</option>
                    <option value="sulit" {{ 'selected' if soal.tingkat_kesulitan=='sulit' else '' }}>Sulit</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Activity</label>
                <select name="id_activity" class="form-select">
                    {% for a in activities %}
                    <option value="{{ a.id }}" {{ 'selected' if relasi and a.id==relasi.id_activity else '' }}>
                        {{ a.title }}
                    </option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <!-- 🔥 EDITOR BARU -->
        <div class="mt-4">
            <div class="mb-2">
                <button type="button" class="btn btn-sm btn-outline-primary"
                    onclick="insertLatex('\\[ \\frac{a}{b} \\]')">
                    Pecahan
                </button>

                <button type="button" class="btn btn-sm btn-outline-success" onclick="insertLatex('\\[ x^2 \\]')">
                    Pangkat
                </button>

                <button type="button" class="btn btn-sm btn-outline-warning" onclick="insertLatex('\\[ \\sqrt{x} \\]')">
                    Akar
                </button>

                <button type="button" class="btn btn-sm btn-outline-danger"
                    onclick="insertLatex('\\[ \\begin{bmatrix} a & b \\\\ c & d \\end{bmatrix} \\]')">
                    Matrix
                </button>
            </div>

            <label class="form-label">Teks Soal</label>

            <textarea id="editor" name="pertanyaan">
                {{ question_text | safe }}
            </textarea>
        </div>

        <hr>

        <!-- MC -->
        <div id="mcSection" style="display:none;">
            <h5>Pilihan Jawaban</h5>

            <div class="row g-3">
                {% for key in ['a','b','c','d','e'] %}
                <div class="col-md-4">
                    <label>Opsi {{ key|upper }}</label>
                    <input name="opsi_{{key}}" class="form-control" value="{{ opsi[key].teks }}">
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- ISIAN -->
        <div id="isianSection" style="display:none;">
            <h5>Jawaban</h5>
            <input name="jawaban_isian" class="form-control" value="{{ soal.SA_Answer }}">
        </div>

        <div class="text-end mt-4">
            <button class="btn btn-warning">Update</button>
        </div>

    </form>

</div>

<!-- 🔥 SCRIPT -->
<script>
    function insertLatex(code) {
        tinymce.activeEditor.insertContent(code);

        // render ulang MathJax
        setTimeout(() => {
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }, 200);
    }
</script>
<script>
    const tipe = "{{ soal.type }}";

    if (tipe === "mc") {
        document.getElementById("mcSection").style.display = "block";
    } else {
        document.getElementById("isianSection").style.display = "block";
    }

    // 🔥 INIT TINYMCE
    tinymce.init({
        selector: '#editor',
        height: 300,
        menubar: false,
        plugins: 'lists link',
        toolbar: 'undo redo | bold italic underline | bullist numlist | link',
        setup: function (editor) {
            editor.on('keyup change', function () {
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }
            });
        }
    });
</script>

{% endblock %}
