{% extends "layouts/base.html" %} {% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

<style>
    body {
        background-color: #f1f5f9;
    }

    .card-custom {
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .card-option {
        border-radius: 14px;
        transition: 0.2s;
    }

    .card-option:hover {
        transform: translateY(-2px);
    }

    .info-box {
        background: #eef6ff;
        border-left: 4px solid #0d6efd;
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 14px;
    }
</style>

<div class="card card-custom p-4">
    <div class="header-top">
        <h4 class="fw-bold text-primary">
            <i class="bi bi-plus-circle"></i> Tambah Soal
        </h4>
    </div>

    <!-- 🔥 PENJELASAN -->
    <div class="info-box mb-4">
        <b>Catatan:</b> Soal akan dimasukkan ke dalam <b>Activity</b>. Topic dan
        Subtopic mengikuti Activity yang dipilih.
    </div>

    <form method="POST">
        <div class="row">
            <!-- TIPE -->
            <div class="col-md-3">
                <label class="form-label">Tipe Soal</label>
                <select id="tipeSoal" name="tipe" class="form-select" required>
                    <option value="">-- Pilih Tipe --</option>
                    <option value="mc">Pilihan Ganda</option>
                    <option value="isian">Isian Singkat</option>
                </select>
            </div>

            <!-- KESULITAN -->
            <div class="col-md-3">
                <label class="form-label">Tingkat Kesulitan</label>
                <select name="kesulitan" class="form-select">
                    <option value="">-- Pilih Kesulitan --</option>
                    <option value="mudah">Mudah</option>
                    <option value="sedang">Sedang</option>
                    <option value="sulit">Sulit</option>
                </select>
            </div>

            <!-- 🔥 ACTIVITY -->
            <div class="col-md-6">
                <label class="form-label">Pilih Aktivitas</label>
                <select name="id_activity" class="form-select" required>
                    <option value="">-- Pilih Activity --</option>
                    {% for a in activities %}
                    <option value="{{ a.id }}">
                        {{ a.title }} - {{ a.topic.topic_name if a.topic else '-' }} / {{
                        a.subtopic.sub_topic_name if a.subtopic else '-' }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- FORM SOAL -->
        <div id="formSoal" style="display: none">
            <div class="mt-4">
                <label class="form-label">Teks Pertanyaan</label>
                <textarea name="pertanyaan" class="form-control" rows="3"></textarea>
            </div>

            <hr class="my-4" />

            <!-- MC -->
            <div id="mcSection" style="display: none">
                <h5 class="fw-bold mb-3">
                    <i class="bi bi-list-ul"></i> Pilihan Jawaban
                </h5>

                <div class="row g-3">
                    <!-- OPSI A -->
                    <div class="col-md-4">
                        <label>Opsi A</label>
                        <input name="opsi_a" class="form-control mb-1" placeholder="Teks" />
                        <input name="url_a" class="form-control" placeholder="URL gambar (opsional)" />
                    </div>

                    <!-- OPSI B -->
                    <div class="col-md-4">
                        <label>Opsi B</label>
                        <input name="opsi_b" class="form-control mb-1" placeholder="Teks" />
                        <input name="url_b" class="form-control" placeholder="URL gambar (opsional)" />
                    </div>

                    <!-- OPSI C -->
                    <div class="col-md-4">
                        <label>Opsi C</label>
                        <input name="opsi_c" class="form-control mb-1" placeholder="Teks" />
                        <input name="url_c" class="form-control" placeholder="URL gambar (opsional)" />
                    </div>

                    <!-- OPSI D -->
                    <div class="col-md-4">
                        <label>Opsi D</label>
                        <input name="opsi_d" class="form-control mb-1" placeholder="Teks" />
                        <input name="url_d" class="form-control" placeholder="URL gambar (opsional)" />
                    </div>

                    <!-- OPSI E -->
                    <div class="col-md-4">
                        <label>Opsi E</label>
                        <input name="opsi_e" class="form-control mb-1" placeholder="Teks" />
                        <input name="url_e" class="form-control" placeholder="URL gambar (opsional)" />
                    </div>

                    <!-- JAWABAN -->
                    <div class="col-md-4">
                        <label>Jawaban Benar</label>
                        <select name="jawaban" class="form-select">
                            <option value="">-- Pilih --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ISIAN -->
            <div id="isianSection" style="display: none">
                <h5 class="fw-bold mb-3">
                    <i class="bi bi-pencil-square"></i> Jawaban Benar
                </h5>

                <input name="jawaban_isian" class="form-control" placeholder="Masukkan jawaban" />
            </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-success">
                <i class="bi bi-check-circle"></i> Simpan Soal
            </button>
        </div>
    </form>
</div>

<script>
    const tipe = document.getElementById("tipeSoal");
    const formSoal = document.getElementById("formSoal");
    const mc = document.getElementById("mcSection");
    const isian = document.getElementById("isianSection");

    tipe.addEventListener("change", function () {
        formSoal.style.display = "block";

        mc.style.display = "none";
        isian.style.display = "none";

        if (this.value === "mc") {
            mc.style.display = "block";
        } else if (this.value === "isian") {
            isian.style.display = "block";
        }
    });
</script>

{% endblock %}
