<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Image Segmentation Learning</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --background: #ffffff;
            --foreground: #1e293b;
            --card: #ffffff;
            --primary: #1a1a2e;
            --primary-hover: #2a2a4a;
            --primary-foreground: #ffffff;
            --muted: #f1f5f9;
            --muted-foreground: #64748b;
            --border: #e2e8f0;
            --input-border: #cbd5e1;
            --sidebar-bg: #1e293b;
            --ring: #1a1a2e;
            --radius: 0.75rem;
            --shadow-soft: 0 4px 20px -2px rgba(30, 41, 59, 0.08);
            --shadow-elegant: 0 20px 60px -10px rgba(30, 41, 59, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background */
        body::before {
            content: "";
            position: absolute;
            top: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle,
                    rgba(220, 38, 38, 0.08) 0%,
                    transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle,
                    rgba(30, 41, 59, 0.06) 0%,
                    transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.25rem;
            box-shadow: 0 6px 16px -4px rgba(220, 38, 38, 0.4);
        }

        .brand-name {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--foreground);
        }

        .brand-name span {
            color: var(--primary);
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow-elegant);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: var(--muted-foreground);
            font-size: 0.9375rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--foreground);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-foreground);
            pointer-events: none;
            display: flex;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 0.875rem 0 2.625rem;
            font-size: 0.9375rem;
            font-family: inherit;
            color: var(--foreground);
            background: var(--background);
            border: 1px solid var(--input-border);
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--muted-foreground);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
        }

        .password-toggle {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--muted-foreground);
            display: flex;
            border-radius: 0.375rem;
            transition:
                color 0.2s,
                background 0.2s;
        }

        .password-toggle:hover {
            color: var(--foreground);
            background: var(--muted);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--input-border);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            background: var(--background);
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-wrapper input[type="checkbox"]:checked::after {
            content: "";
            position: absolute;
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-wrapper label {
            font-size: 0.875rem;
            color: var(--foreground);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            height: 46px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px -2px rgba(220, 38, 38, 0.35);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px -2px rgba(220, 38, 38, 0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--muted-foreground);
            font-size: 0.8125rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .signup-text {
            text-align: center;
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        .signup-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;

            border-top: 1px solid var(--card-border);

            padding: 18px 0;

            background: white;
        }

        .footer .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--fg);
        }

        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;

            margin-top: 20px;

            color: var(--muted-foreground);
            text-decoration: none;

            font-size: 14px;
            font-weight: 500;

            transition: 0.2s;
        }

        .btn-back:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.75rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="brand">
            <div class="brand-icon">SI</div>
            <div class="brand-name">Segmentation<span> Image</span></div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h1>Selamat Datang</h1>
                <p>Silakan masuk ke akun Anda</p>
            </div>

            <form method="POST" action="{{ url_for('user.login') }}">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="m22 7-10 5L2 7" />
                            </svg>
                        </span>
                        <input type="email" name="email" id="email" class="form-input" placeholder="nama@email.com"
                            value="{{ old.email if old }}" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" name="password" id="password" class="form-input"
                            placeholder="Masukkan password" required />
                        <button type="button" class="password-toggle" onclick="togglePassword()"
                            aria-label="Toggle password">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Login
                </button>

                <div class="divider">atau</div>

                <p class="signup-text">
                    Belum punya akun?
                    <a href="{{ url_for('user.register') }}">Daftar sekarang</a>
                </p>
                <a href="/" class="btn-back">
                    ← Kembali ke Landing Page
                </a>
            </form>
        </div>

    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML =
                    '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';
            } else {
                input.type = "password";
                icon.innerHTML =
                    '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const status = "{{ request.args.get('status') | default('') }}";
        const message = "{{ request.args.get('message') | default('') }}";

        if (status && status !== "None" && message && message !== "None") {
            Swal.fire({
                icon: status === "success" ? "success" : "error",
                title: status === "success" ? "Berhasil" : "Login Gagal",
                text: message,
                showConfirmButton: true,
                confirmButtonText: "OK",
                confirmButtonColor: "#1A1A2E",
            }).then((result) => {
                // Bersihkan URL setelah diklik
                if (window.history.replaceState) {
                    const url = new URL(window.location);
                    url.searchParams.delete("status");
                    url.searchParams.delete("message");
                    window.history.replaceState({ path: url.href }, "", url.href);
                }
            });
        }
    </script>
</body>

</html>
