<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ activity.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kuis.css') }}">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            }
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <header class="cbt-header">
        <div class="container d-flex justify-content-between align-items-center">

            <!-- Judul kuis -->
            <h5 class="mb-0 fw-semibold text-primary">
                {{ activity.title }}
            </h5>

            <!-- Info user -->
            <div class="user-info text-end">
                <strong>
                    {% if current_user %}
                    {{ current_user.name }}
                    {% else %}
                    Guest
                    {% endif %}
                </strong>
            </div>

        </div>
    </header>

    <div class="container pb-5">
        <form id="quizForm" method="POST" action="/submit-kuis-evaluasi" data-title="{{ activity.title }}"
            data-id="{{ activity.id }}">
            <input type="hidden" name="activity_id" value="{{ activity.id }}">
            <div class="main-container">

                <div class="content-area">
                    <div class="question-card">
                        <div class="question-header">
                            SOAL NOMOR <span id="displayNum">1</span>
                        </div>

                        <div class="question-body" id="questionContainer">

                        </div>

                        <div class="question-footer">
                            <button type="button" class="btn btn-outline-secondary px-4 fw-semibold" id="btnPrev"
                                onclick="changeQuestion(-1)">SEBELUMNYA</button>

                            <button type="button" class="btn btn-warning fw-semibold px-4" id="btnRagu"
                                onclick="toggleRagu()">
                                RAGU-RAGU
                            </button>

                            <button type="button" class="btn btn-primary px-4 fw-semibold" id="btnNext"
                                onclick="changeQuestion(1)">SELANJUTNYA</button>
                        </div>
                    </div>
                </div>

                <div class="sidebar-area">
                    <div class="sidebar-card">
                        <div class="timer-box" id="timer" data-duration="{{ activity.durasi_pengerjaan }}">
                            00:00
                        </div>

                        <h6 class="fw-bold mb-3">Nomor Soal</h6>
                        <div class="q-grid mb-4" id="navContainer"></div>
                        <div class="mt-3 small">
                            <div class="d-flex align-items-center mb-2">
                                <span class="legend-box me-2 legend-answered"></span> Sudah dijawab
                            </div>
                            <div class="d-flex align-items-center mb-2">
                                <span class="legend-box me-2 legend-ragu"></span> Ragu-ragu
                            </div>
                            <div class="d-flex align-items-center mb-2">
                                <span class="legend-box me-2 legend-active"></span> Sedang dikerjakan
                            </div>
                            <div class="d-flex align-items-center">
                                <span class="legend-box me-2 legend-default"></span> Belum dijawab
                            </div>
                        </div>

                        <hr>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                            SELESAI UJIAN
                        </button>
                    </div>
                </div>

            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/kuis.js') }}"></script>
</body>

</html>
